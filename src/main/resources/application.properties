spring.application.name=map_shortest_path_finder

# ─── Database ─────────────────────────────────────────────────────────────────
# Matches the credentials in docker-compose.yml.
# The app requires Docker to be running: `docker compose up -d`
spring.datasource.url=jdbc:postgresql://localhost:5432/mapdb
spring.datasource.username=postgres
spring.datasource.password=password


# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update = creates missing tables automatically, never drops existing data.
# Switch to 'validate' once the schema is stable and you want Hibernate to
# catch mismatches instead of silently patching them.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Batch inserts: instead of N individual INSERTs, Hibernate groups them into
# batches of 500. Critical for the graph import (potentially 10k+ rows).
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

# ─── Region ───────────────────────────────────────────────────────────────────
# Rajahmundry urban core, Andhra Pradesh, India.
# Bounding box covers the main city grid (~6 km x 7 km).
# To expand or change region: update these four values and re-run the import.
region.name=Rajahmundry
region.bbox.south=16.96
region.bbox.north=17.01
region.bbox.west=81.76
region.bbox.east=81.82

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.sashank=INFO